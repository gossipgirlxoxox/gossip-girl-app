<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotted</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter;
  background:black;
  color:#f8f5f0;
}

header {
  text-align:center;
  padding:20px;
  font-family:Cinzel;
  color:gold;
}

.layout {display:flex;}

.sidebar {
  width:220px;
  padding:10px;
  border-right:1px solid #333;
}

.main {
  flex:1;
  padding:20px;
}

.card {
  background:#111;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  animation: fadeIn 0.4s ease;
}

button {
  background:gold;
  border:none;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
  margin:3px;
}

input, textarea {
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#000;
  color:white;
  border:1px solid #333;
}

img {max-width:100%; border-radius:10px;}

.exposed {box-shadow:0 0 20px red;}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>

</head>
<body>

<header>
  <h1>Spotted</h1>
  <p>XOXO Gossip Girl</p>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <button onclick="adminLogin()">👑 Admin</button>
</header>

<div class="layout">

<div class="sidebar">
  <h3>💬 DMs</h3>
  <button onclick="sendDM()">Send DM</button>
  <div id="dmList"></div>

  <h3>📩 Tips</h3>
  <button onclick="sendTip()">Send Tip</button>
  <button onclick="viewTips()">View Tips</button>
</div>

<div class="main">

<div class="card">
<textarea id="postText" placeholder="Spotted..."></textarea>
<input type="file" id="image">
<button onclick="createPost()">Post</button>
</div>

<div id="posts"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore, collection, addDoc, doc,
  updateDoc, deleteDoc, onSnapshot, query, orderBy, getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjrvmy6yxF9N5evXShQNM3Vt9LhmtqafA",
  authDomain: "gossipgirl-a4f2d.firebaseapp.com",
  projectId: "gossipgirl-a4f2d",
  storageBucket: "gossipgirl-a4f2d.appspot.com",
  messagingSenderId: "367254403065",
  appId: "1:367254403065:web:70246b85fcc093453a6f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
let isAdmin = false;

onAuthStateChanged(auth, user => currentUser = user);

// 🔔 Notification
function notify(text){
  const n = document.createElement("div");
  n.innerText = text;
  n.style.position="fixed";
  n.style.bottom="20px";
  n.style.right="20px";
  n.style.background="black";
  n.style.color="gold";
  n.style.padding="10px";
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

// 🔐 SIGNUP WITH USERNAME
window.signup = async () => {
  const email = prompt("Email:");
  const pass = prompt("Password:");
  const username = prompt("Username:");

  const userCred = await createUserWithEmailAndPassword(auth,email,pass);

  await addDoc(collection(db,"users"),{
    uid:userCred.user.uid,
    username:username
  });
};

// 🔐 LOGIN
window.login = async () => {
  const email = prompt("Email:");
  const pass = prompt("Password:");
  await signInWithEmailAndPassword(auth,email,pass);
};

window.logout = () => signOut(auth);

// 👑 ADMIN
window.adminLogin = () => {
  if(prompt("Password") === "xoxo"){
    isAdmin = true;
    alert("Welcome Gossip Girl");
  }
};

// 🔎 GET USERNAME
async function getUsername(uid){
  const snap = await getDocs(collection(db,"users"));
  let name = "Unknown";
  snap.forEach(doc=>{
    if(doc.data().uid === uid){
      name = doc.data().username;
    }
  });
  return name;
}

// 📸 IMAGE UPLOAD
async function uploadImage(file){
  const storageRef = ref(storage, 'images/' + Date.now());
  await uploadBytes(storageRef, file);
  return await getDownloadURL(storageRef);
}

// 📝 POST
window.createPost = async () => {
  if(!currentUser) return alert("Login first");

  const text = document.getElementById('postText').value;
  const file = document.getElementById('image').files[0];

  let img = "";
  if(file) img = await uploadImage(file);

  const username = await getUsername(currentUser.uid);

  await addDoc(collection(db,"posts"),{
    text,
    img,
    user:username,
    uid:currentUser.uid,
    likes:[],
    exposed:false,
    time:Date.now()
  });

  notify("New gossip posted 👀");
};

// ❤️ LIKE
async function likePost(id,likes){
  if(!currentUser) return;
  let updated = likes.includes(currentUser.uid)
    ? likes.filter(l=>l!==currentUser.uid)
    : [...likes,currentUser.uid];

  await updateDoc(doc(db,"posts",id),{likes:updated});
}

// 💬 COMMENT
async function addComment(postId){
  const text = prompt("Comment:");
  if(!text) return;

  const username = await getUsername(currentUser.uid);

  await addDoc(collection(db,"posts",postId,"comments"),{
    text,
    user:username,
    time:Date.now()
  });
}

// 👑 DELETE / EXPOSE
async function deletePost(id){
  if(!isAdmin) return;
  await deleteDoc(doc(db,"posts",id));
}

async function exposePost(id,val){
  if(!isAdmin) return;
  await updateDoc(doc(db,"posts",id),{exposed:!val});
}

// 💬 DM SYSTEM (FIXED)
window.sendDM = async () => {
  const username = prompt("Send to:");
  const msg = prompt("Message:");

  const users = await getDocs(collection(db,"users"));
  let target = null;

  users.forEach(u=>{
    if(u.data().username === username){
      target = u.data().uid;
    }
  });

  if(!target) return alert("User not found");

  const chatId = [currentUser.uid,target].sort().join("_");

  await addDoc(collection(db,"dms",chatId,"messages"),{
    text:msg,
    from:currentUser.uid,
    time:Date.now()
  });

  notify("DM sent 💬");
};

// 🕵️ TIPS
window.sendTip = async ()=>{
  const t = prompt("Tip:");
  if(t) await addDoc(collection(db,"tips"),{text:t,time:Date.now()});
};

window.viewTips = ()=>{
  if(!isAdmin) return alert("Admins only");
  onSnapshot(collection(db,"tips"), snap=>{
    let txt="";
    snap.forEach(d=>txt+=d.data().text+"\n\n");
    alert(txt);
  });
};

// 🔥 POSTS RENDER
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")), snap=>{
  const div = document.getElementById("posts");
  div.innerHTML="";

  snap.forEach(docSnap=>{
    const p = docSnap.data();
    const id = docSnap.id;

    const el = document.createElement("div");
    el.className="card";
    if(p.exposed) el.classList.add("exposed");

    const badge = p.likes.length > 5 ? "💎 Elite" : "";

    el.innerHTML = `
      <b>${p.user} ${badge}</b>
      <p>${p.text}</p>
      ${p.img?`<img src="${p.img}">`:''}
      <p>❤️ ${p.likes.length}</p>
    `;

    const likeBtn = document.createElement("button");
    likeBtn.innerText="Like";
    likeBtn.onclick=()=>likePost(id,p.likes);

    const cBtn = document.createElement("button");
    cBtn.innerText="Comment";
    cBtn.onclick=()=>addComment(id);

    el.appendChild(likeBtn);
    el.appendChild(cBtn);

    if(isAdmin){
      const del = document.createElement("button");
      del.innerText="Delete";
      del.onclick=()=>deletePost(id);

      const ex = document.createElement("button");
      ex.innerText="Expose";
      ex.onclick=()=>exposePost(id,p.exposed);

      el.appendChild(del);
      el.appendChild(ex);
    }

    const commentsDiv = document.createElement("div");

    onSnapshot(collection(db,"posts",id,"comments"), cSnap=>{
      commentsDiv.innerHTML="";
      cSnap.forEach(c=>{
        const el = document.createElement("div");
        el.innerText="💬 "+c.data().text;
        commentsDiv.appendChild(el);
      });
    });

    el.appendChild(commentsDiv);
    div.appendChild(el);
  });
});

</script>

</body>
</html>
