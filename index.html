<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotted</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter;
  background:black;
  color:white;
}

header {
  text-align:center;
  padding:20px;
  font-family:Cinzel;
  color:gold;
}

.layout {display:flex;}

.sidebar {
  width:220px;
  padding:10px;
  border-right:1px solid #333;
}

.main {flex:1; padding:20px;}

.card {
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

button {
  background:gold;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  margin:3px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  background:#000;
  color:white;
  border:1px solid #333;
}

img {max-width:100%; border-radius:10px;}

.small {
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <h1>Spotted</h1>
  <p>XOXO Gossip Girl</p>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <button onclick="adminLogin()">Admin</button>
</header>

<div class="layout">

<div class="sidebar">
  <h3>💬 DMs</h3>
  <button onclick="sendDM()">Send DM</button>
  <button onclick="viewDMs()">View DMs</button>

  <h3>🕵️ Tips</h3>
  <button onclick="sendTip()">Send Tip</button>
  <button onclick="viewTips()">View Tips</button>
</div>

<div class="main">
  <div id="panel"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjrvmy6yxF9N5evXShQNM3Vt9LhmtqafA",
  authDomain: "gossipgirl-a4f2d.firebaseapp.com",
  projectId: "gossipgirl-a4f2d",
  storageBucket: "gossipgirl-a4f2d.appspot.com",
  messagingSenderId: "367254403065",
  appId: "1:367254403065:web:70246b85fcc093453a6f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth, u => currentUser = u);

function username(){
  return localStorage.getItem("username") || "Anonymous";
}

function setPanel(html){
  document.getElementById("panel").innerHTML = html;
}

function isAdmin(){
  return localStorage.getItem("admin")==="true";
}

/* ================= AUTH ================= */

window.signup = async () => {
  const email = prompt("Email");
  const pass = prompt("Password");
  const user = prompt("Username");

  const cred = await createUserWithEmailAndPassword(auth,email,pass);

  await addDoc(collection(db,"users"),{
    uid:cred.user.uid,
    username:user
  });

  localStorage.setItem("username",user);
  alert("Welcome " + user);
};

window.login = async () => {
  const email = prompt("Email");
  const pass = prompt("Password");

  const cred = await signInWithEmailAndPassword(auth,email,pass);
  alert("Logged in");
};

window.logout = () => signOut(auth);

window.adminLogin = () => {
  if(prompt("Admin pass") === "xoxo"){
    localStorage.setItem("admin","true");
    alert("Admin enabled");
  }
};

/* ================= TIPS ================= */

window.sendTip = async () => {
  const text = prompt("Anonymous tip:");
  if(!text) return;

  await addDoc(collection(db,"tips"),{
    text,
    time:Date.now()
  });

  alert("Tip sent anonymously");
};

window.viewTips = async () => {
  const snap = await getDocs(query(collection(db,"tips"),orderBy("time","desc")));

  let html = "<h2>🕵️ Tips</h2>";

  snap.forEach(d=>{
    html += `
      <div class="card">
        🕵️ ${d.data().text}
        <div class="small">Anonymous</div>
      </div>
    `;
  });

  setPanel(html);
};

/* ================= DMS ================= */

window.sendDM = async () => {
  const to = prompt("Send to username:");
  const text = prompt("Message:");

  if(!to || !text) return;

  await addDoc(collection(db,"dms"),{
    from:username(),
    to,
    text,
    time:Date.now()
  });

  alert("DM sent");
};

window.viewDMs = async () => {
  const snap = await getDocs(query(collection(db,"dms"),orderBy("time","desc")));

  let html = "<h2>💬 DMs</h2>";

  snap.forEach(d=>{
    const dm = d.data();

    if(dm.to === username() || dm.from === username() || isAdmin()){
      html += `
        <div class="card">
          <b>${dm.from}</b> → <b>${dm.to}</b>
          <p>${dm.text}</p>
        </div>
      `;
    }
  });

  setPanel(html);
};

</script>

</body>
</html>
