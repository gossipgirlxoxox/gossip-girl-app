<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotted 👀</title>

<style>
body {background:black;color:white;font-family:sans-serif;}
.card {background:#111;padding:15px;margin:10px;border-radius:10px;}
button {background:gold;border:none;padding:8px;margin:5px;}
textarea {width:100%;padding:10px;margin:10px 0;}
</style>

</head>
<body>

<h1>Spotted 👀</h1>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<div>
<textarea id="postText" placeholder="Spotted..."></textarea>
<button onclick="createPost()">Post</button>
</div>

<div id="posts"></div>

<script type="module">

// 🔥 IMPORTS (v12 style)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { 
  getFirestore, collection, addDoc, 
  onSnapshot, query, orderBy 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔐 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCjrvmy6yxF9N5evXShQNM3Vt9LhmtqafA",
  authDomain: "gossipgirl-a4f2d.firebaseapp.com",
  projectId: "gossipgirl-a4f2d",
  storageBucket: "gossipgirl-a4f2d.firebasestorage.app",
  messagingSenderId: "367254403065",
  appId: "1:367254403065:web:70246b85fcc093453a6f28"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 AUTH FUNCTIONS
window.signup = async function(){
  const email = prompt("Email:");
  const pass = prompt("Password:");
  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("Account created!");
  } catch(e){
    alert(e.message);
  }
};

window.login = async function(){
  const email = prompt("Email:");
  const pass = prompt("Password:");
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    alert("Logged in!");
  } catch(e){
    alert(e.message);
  }
};

window.logout = function(){
  signOut(auth);
};

// 📌 CURRENT USER
let currentUser = null;

onAuthStateChanged(auth, (user)=>{
  if(user){
    currentUser = user;
    console.log("Logged in as", user.email);
  } else {
    currentUser = null;
    console.log("Logged out");
  }
});

// 📝 CREATE POST
window.createPost = async function(){
  if(!currentUser){
    alert("Login first!");
    return;
  }

  const text = document.getElementById("postText").value;

  await addDoc(collection(db, "posts"), {
    text: text,
    user: currentUser.email,
    time: Date.now()
  });

  document.getElementById("postText").value = "";
};

// 🔥 REAL-TIME POSTS
const q = query(collection(db, "posts"), orderBy("time","desc"));

onSnapshot(q, (snapshot)=>{
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  snapshot.forEach(doc=>{
    const p = doc.data();

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <b>${p.user}</b>
      <p>${p.text}</p>
    `;

    postsDiv.appendChild(el);
  });
});

</script>

</body>
</html>
