<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotted</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter;
  background:black;
  color:white;
}

header {
  text-align:center;
  padding:20px;
  font-family:Cinzel;
  color:gold;
}

.layout {display:flex;}

.sidebar {
  width:220px;
  padding:10px;
  border-right:1px solid #333;
}

.main {
  flex:1;
  padding:20px;
}

.card {
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

button {
  background:gold;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  margin:3px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  background:#000;
  color:white;
  border:1px solid #333;
}

img {max-width:100%; border-radius:10px;}
</style>
</head>

<body>

<header>
  <h1>Spotted</h1>
  <p>XOXO Gossip Girl</p>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <button onclick="adminLogin()">Admin</button>
</header>

<div class="layout">

<div class="sidebar">
  <h3>💬 DMs</h3>
  <button onclick="sendDM()">Send DM</button>

  <h3>🕵️ Tips</h3>
  <button onclick="sendTip()">Send Tip</button>
  <button onclick="viewTips()">View Tips</button>
</div>

<div class="main">

<div class="card">
<textarea id="postText" placeholder="Spotted..."></textarea>
<input type="file" id="image">
<button onclick="createPost()">Post</button>
</div>

<div id="posts"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  doc,
  updateDoc,
  deleteDoc,
  onSnapshot,
  query,
  orderBy,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjrvmy6yxF9N5evXShQNM3Vt9LhmtqafA",
  authDomain: "gossipgirl-a4f2d.firebaseapp.com",
  projectId: "gossipgirl-a4f2d",
  storageBucket: "gossipgirl-a4f2d.appspot.com",
  messagingSenderId: "367254403065",
  appId: "1:367254403065:web:70246b85fcc093453a6f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// 👑 ALWAYS READ LIVE ADMIN STATE (FIX)
function isAdmin(){
  return localStorage.getItem("admin") === "true";
}

onAuthStateChanged(auth, user => {
  currentUser = user;
});

// 💎 USERNAME SYSTEM
function setUsername(name){
  localStorage.setItem("username", name);
}

function getUsername(){
  return localStorage.getItem("username") || "Anonymous";
}

// 🔐 SIGNUP
window.signup = async () => {
  const email = prompt("Email:");
  const pass = prompt("Password:");
  const username = prompt("Username:");

  const userCred = await createUserWithEmailAndPassword(auth,email,pass);

  await addDoc(collection(db,"users"),{
    uid:userCred.user.uid,
    username
  });

  setUsername(username);

  alert("Welcome " + username);
};

// 🔐 LOGIN
window.login = async () => {
  const email = prompt("Email:");
  const pass = prompt("Password:");

  const userCred = await signInWithEmailAndPassword(auth,email,pass);

  const users = await getDocs(collection(db,"users"));

  users.forEach(u=>{
    if(u.data().uid === userCred.user.uid){
      setUsername(u.data().username);
    }
  });

  alert("Logged in as " + getUsername());
};

window.logout = () => signOut(auth);

// 👑 ADMIN LOGIN (FIXED)
window.adminLogin = () => {
  const pass = prompt("Admin password");

  if(pass === "xoxo"){
    localStorage.setItem("admin","true");
    alert("Admin mode enabled 👑");
  }
};

// 📝 CREATE POST
window.createPost = async () => {
  if(!currentUser) return alert("Login first");

  const text = document.getElementById("postText").value;
  const file = document.getElementById("image").files[0];

  let img = "";

  if(file){
    const reader = new FileReader();
    reader.onload = async () => {
      await addDoc(collection(db,"posts"),{
        text,
        img: reader.result,
        user: getUsername(),
        likes: [],
        time: Date.now()
      });
    };
    reader.readAsDataURL(file);
    return;
  }

  await addDoc(collection(db,"posts"),{
    text,
    img:"",
    user:getUsername(),
    likes:[],
    time:Date.now()
  });
};

// ❤️ LIKE
async function likePost(id,likes){
  if(!currentUser) return;

  const uid = currentUser.uid;

  let updated = likes.includes(uid)
    ? likes.filter(l=>l!==uid)
    : [...likes,uid];

  await updateDoc(doc(db,"posts",id),{likes:updated});
}

// 💬 DM
window.sendDM = async () => {
  const toUser = prompt("Send to username:");
  const msg = prompt("Message:");

  const snap = await getDocs(collection(db,"users"));

  let target = null;
  snap.forEach(u=>{
    if(u.data().username === toUser){
      target = u.data().uid;
    }
  });

  if(!target) return alert("User not found");

  const chatId = [getUsername(), toUser].sort().join("_");

  await addDoc(collection(db,"dms",chatId,"messages"),{
    from:getUsername(),
    text:msg,
    time:Date.now()
  });

  alert("Sent 💬");
};

// 🔥 REALTIME POSTS
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")), snap=>{
  const div = document.getElementById("posts");
  div.innerHTML="";

  snap.forEach(docSnap=>{
    const p = docSnap.data();
    const id = docSnap.id;

    const el = document.createElement("div");
    el.className="card";

    el.innerHTML = `
      <b>@${p.user}</b>
      <p>${p.text}</p>
      ${p.img ? `<img src="${p.img}">` : ""}
      <p>❤️ ${p.likes.length || 0}</p>
    `;

    const likeBtn = document.createElement("button");
    likeBtn.innerText = "Like";
    likeBtn.onclick = () => likePost(id, p.likes || []);

    el.appendChild(likeBtn);

    // 👑 ADMIN DELETE (NOW ALWAYS WORKS)
    if(isAdmin()){
      const delBtn = document.createElement("button");
      delBtn.innerText = "Delete";

      delBtn.onclick = async () => {
        await deleteDoc(doc(db,"posts",id));
      };

      el.appendChild(delBtn);
    }

    div.appendChild(el);
  });
});

</script>

</body>
</html>
